body:
  text: 清雲間蓮華菴後學沙門悟開著淨土法門不落偏徑如何正説一此門法道一切根器齊收門庭施設宜乎徹上徹下五教全該徹上以被上根徹下以接下根信行願所謂資糧經律論皆為助行要其所歸總不可離卻淨土三經如是立説是名正説自古及今東土大善知識闡揚淨業正説者是誰二正説有二一者全體大用通途正説二者一事一理逗機正説古今大善知識不可勝計其所著述多已散亡今所存者不肖披覽甚寡惟就見聞其雲棲彌陀疏鈔是全體大用通途正説如天台十疑天如或問等皆是一事一理逗機正説淨業行人最關緊要切須求閲而玩味焉妙宗鈔用三觀釋鈍根難入其亦偏説乎三觀法高深幽遠非用天台三觀不足以彰圓妙是正説非偏説也若鈍根難入者可長誦觀經誦之熟思之熟隨其經文而想見之雖不開慧性不成觀道亦是粗淺學觀之一法但止要誦觀經想觀經不得在觀經外加一字講究就在經中不得妄性議論不依此説恐入邪魔觀想之圓妙與持名中理一心相去幾何四同一不可思議觀經下品持名往生此等持名到何境界五到事一心境界不到事一心還得往生否六不到事一心難以往生何以知之阿彌陀經云一心不亂其人臨命終時阿彌陀佛與諸聖衆現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土心不顛倒一心不亂雖不能理一心亦須事一心也明甚念佛時總有雜想何能一心七若肯長看無量壽經靜坐思惟保管漸得一心觀經云欲生彼國者當修三福又云如此三事名為淨業又云此三種業乃是過去未來現在三世諸佛淨業正因據此已是淨業正因不必更求觀法可乎八此經正旨歸在十六觀門所云淨業正因者正是偏正之正非正助之正猶言如此三福為淨業中真正之因不是偏邪之因也觀經是心作佛是心是佛其意云何九作者修也言是心修佛道是心本是佛也既本是佛何假修為所以無心合道道在是焉起念興修修滋妄耳十不修到十分田地安得無心合道道在是焉耶修而滋妄修成妄滅不修而妄妄妄無窮思之觀經云於現身中得念佛三昧云何為念佛三昧十一梵語三昧此云正定亦云正受念佛三昧者思專想寂智與理冥欲人易曉復作一説念即佛佛即念念佛一如亦無念佛之相可得是名念佛三昧觀經無量壽佛身高六十萬億那由他恆河沙由旬如何觀法十二自他相亡如説而觀彌陀疏鈔何以謂之通途正説十三不矯不枉無黨無偏中正和平獨明厥旨謂之通途正説十疑或問何以謂之一事一理逗機正説十四初欲起信尚具疑情十疑論剖明所以令其豁然無滯參禪人或稍知光影即輕藐蓮宗皆由不明佛理誤入狂癡天如和尚痛下犍椎擊開迷網專為一類之機發明正旨謂之一事一理逗機正説此二者最關緊要故特標出耳修行之士得何等氣質易於入道十五剛健中正純粹此等氣質堪作法器剛能荷擔阿耨多羅三藐三菩提健能為法為人中則不落偏徑正則不生邪思昔日臨濟初入道親近黃蘗睦州見其行業純一令問黃蘗佛法大意臨濟三度喫棒旋於大愚言下悟徹佛法無多子當知此時大悟皆從平日行業純一中來若非行業純一雖有百千黃蘗大愚安能大悟耶而臨濟之行業純一亦由氣質之純粹所致儒書云顏子深潛純粹故為孔門高弟況佛門法器安可反遜于此古今稱大善知識者宗門如馬祖百丈等教下如清涼天台等淨土如蓮宗九祖等皆剛健中正純粹者也然此且就世諦而論小而言之耳其實大智慧根光明徹乎邊表豈可言説我等後生小子志求大道者敢弗勉旃門庭卓立高不可攀淺質庸流望崖而退安所謂三根普被十六大凡學道當先知至理猶儒家修德講學當先知得堯舜禹湯文武周公孔子之所以為堯舜禹湯文武周公孔子然後一步一步學將去縱不成聖即成賢不成賢即成大儒隨其學力淺深皆不失為聖門弟子今念佛人當先知得阿彌陀佛本願功德又知得歷祖高風然後一步一步行將去不得十分成就即七八五六乃至一二分亦隨其學力淺深皆得名為淨業成就既成就已皆得往生既往生已皆得不退皆得直至無上菩提何曾不是三根普被哉彼望崖而退者不足以語信心人也信且不真佛亦無可如何一二分成就皆得往生何故認真念佛二三十年臨終時瑞應罕聞豈如是之久尚未成就一二分乎十七良繇認真念佛不是認正念佛何也或以切實正法相告因不順我懷即不入其耳或以虗華無益相聞因恰合我意即期在必行不求正法但任己情因而逐浪隨波一生熱閙所謂擔麻棄金唐喪光陰者矣若欲一二分淨業成就於茲亟宜猛省古人謂念佛不礙參禪參禪不礙念佛又有謂念佛礙參禪參禪礙念佛究竟如何十八法有二門理無二致指理言不礙指法言礙但理待悟後而明法即現前所用法者方法也方法即無兩般心無二用故言礙歸源性無二故言不礙利根當參禪鈍根當念佛是否十九參禪與念佛各從其志可也若以利鈍配定是何言歟志氣堅勇鈍亦能悟體究念佛非利不成若説祖師門下專接上根愚夫愚婦皆會念佛此一往之詞耳參禪悟後與佛齊肩念佛往生不脫生死然否二十悟後尚待進修為有業識流注未淨溈山和尚言之詳矣只聞極樂世界蓮華中生不聞極樂世界蓮華中死蓮池大師言之盡矣嗟乎不具正知見又不明典章有如此誤慎之哉中峯云禪者淨土之禪淨土者禪之淨土何謂也二十一梵語禪那此云靜慮即慮而靜是定即靜而慮是慧所云禪者定慧耳淨土法門亦資定慧禪與淨土二名雖異其定慧一也猶云定慧者淨土之定慧淨土者定慧之淨土中峯此語蓋䇿淨業而進定慧之功誡參徒而開淨土之行乃禪淨雙修語也禪淨雙修要分前後還是一時二十二達磨宗旨超越教乘不同四禪八定所以古人道這箇尚不與教乘合何況儒書是知應分前後若先參禪見性而更修淨業最為順理古來宗門龍象並宏淨業者皆如此天衣云生則決定生去則實不去何謂也二十三淨土往生佛無虗語故云生則決定生若了彌陀即本性本性即彌陀而如來者無所從來亦無所去故云去則實不去此理事並舉權實雙彰語也淨土法門每稱禪觀是何等禪耶二十四非達磨禪亦非四禪八定禪所云禪者乃體究念佛即持名中理持工夫然持名至理一心之極達磨禪四禪八定非二致也禪淨雙修宜先禪後淨前已聞命但何以不可齊修其有説乎二十五念佛不怕取相參禪先要離相取與離難以並行修習滯名著相未離妄緣達士所譏良由是矣二十六念阿彌陀佛正覺圓滿之名觀極樂世界清淨莊嚴之相如此滯著只怕未能切實果能切實則世間種種幻化妄緣自當遠離正是捨妄歸真之法背塵合覺之方況此取相離相皆是入門方便譬若心欲到家不從其門而入還能到家否每見古德指示念佛之間箇是誰與參話頭相似又云自問阿那箇是本性阿彌陀其法如此草七此是後代師家變法並非佛説淨業正旨在師家意中欲人悟明本性然間看誰字尚可若自問阿那箇是本性阿彌陀未免引起識情湊泊之弊近時為師者遷就學人尤甚作家宗師決不如是學者皆稱參禪能悟念佛不能悟故知念佛不及參禪二十八念佛不能悟齊東野人之語楞嚴大勢至圓通章云不假方便自得心開言心開豈非悟境觀經上器往生章云解第一義言解第一義豈非悟境達唯心淨土了本性彌陀言達言了豈非悟境以要言之體究念佛皆悟境也觀雲棲疏鈔理一心文中自明不過淨土法門以信願往生而行修念佛是緊要正旨悟不悟不計也所以永明禪師有但得見彌陀何愁不開悟之料簡當知非因無能悟而言此也至于達磨禪宗學者若到桶底脫落更透過末後牢關做箇脫灑漢子此等人作略超過一切法門所以謂之祖師禪也四種念佛其説如何二十九四種者謂持名念佛觀像念佛觀想念佛實相念佛也觀像所以束斂身心可為觀想之前導持名之助緣實相者離一切相之相也離過絶非不可思議持名至理一心觀想至覺觀雙亡則同歸實相也此念佛之極則神功妙用非口頭三昧者所能窺測念佛素稱簡易何以今説如是之難三十簡易之語其意有二一則就其中下之根説要截斷輪回徑往西方永超生死只消專志念佛心不顛倒不論賢愚皆能成就故云簡易一據六度萬行祗劫熏修方成佛道今則六字洪名不拘久近果能正念分明便得彌陀接引托質蓮胎俱臻不退豈非簡易古人謂萬修萬人去然今念佛而未必往生者何故三十一楞嚴經云憶佛念佛現前當來必定見佛此乃感應使然若萬人真實感則萬人真實應此之謂萬修萬人去也往生念佛之人口雖念佛心不依佛仍舊自逞主見如何若何一聞真切語便難而畏之一聞方便語便易而忽之如此念佛實則具文而已未必往生若見難不畏見易不忽常求開導時切精思依佛念佛古人語決非誑汝既發願往生只須念佛何假修諸功德轉成有漏之因三十二凡修佛道福慧並尊有漏無漏隨人心向不可因有漏之福無常而遂廢莊嚴佛土之大福德也故彌陀經云不可以少善根福德因緣得生彼國善根念佛也福德因緣修諸功德也無量壽經三輩往生章云發菩提心修諸功德奉持齋戒起立塔像飯食沙門懸繒然燈散華燒香觀無量壽佛經云欲生彼國者當修三福一者孝養父母奉侍師長慈心不殺修十善業二者受持三歸具足衆戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者又云發三種心即便往生何等為三一者至誠心二者深心三者回向發願心具三心者必生彼國如此等説難以備舉學者宜盡心焉念佛本屬易行若如前説其不令人裹足乎三十三佛不異語惟在當人善會耳根性固有利鈍而人力又有瘠肥但當思勉其鞠躬盡瘁豈可漫諉之於力不足也耶在俗念佛輒為善務糾纏有何方便不礙修持三十四此事全在當人善於調處調處得宜即不礙也念佛與持呪相似否三十五不相似呪具威神之力不可思議但如法加持即成機感不用體究也念佛者有事有理有性有相有權有實要由體究而得明了故不相似念佛與誦經相似否三十六可云相似何以故誦經者散之而為經中若干文義若干句義若干字義收之則不出一佛義天台云言佛便周是也今念佛者即是念一切經義一切文義一切句義一切字義何以故佛是覺義經云無上妙覺遍諸十方出生如來與一切法同體平等是也念佛工夫有幾等次序有幾時更為要緊三十七次序三一者專心念佛二者究心念佛三者一心念佛更為要緊三一者病時二者老時三者死時念佛時有雜念起問此雜念從何來三十八人之一身止有一念念佛之念即是他雜念之念亦即是他只因這一念不能全分歸於念佛即有少分在念佛之外雜念者即此少分佛外之念驀地裡兜著塵勞業種乘此念佛時插入耳如何得除去雜念三十九不消除得但自抖擻精神以此一念全提在佛上雜念即無雖知如是奈精力罷弱不能使之即無又當如何四十道力未充多諸散亂收攝六根漸歸清淨不得已姑設方便袪之念佛時當雜念起不要理會他我只是念更加目注佛像或念注佛像自無雜念矣如此做去始而果好但久久又有雜念起時如何四十一內心渾濁外境紛拏念佛便不得力甚至雜念纏擾不開此時不必焦燥但結湛心思令六字洪名一一從念提起由口出聲耳中歷歷聽聞又復念中流出循環貫攝不令間斷雜念自無如此固妙奈有鈍根不能者又且如何四十二智者大師開欣厭二門初心入道切須起欣厭心欣厭一生精進自發內心渾濁漸見澄清外境紛拏自然消散念佛時便覺輕安適悅若欣厭不生竟無入路矣如不會做工夫念佛而多雜想者可將南無阿彌陀佛六個字當念佛一聲即記在南字上第二聲記在無字上又阿又彌又陀又佛又南連環記認不斷一切雜念無處出生矣上根念佛亦有雜念如何遣法四十三圓覺經云知是空華即無輪轉亦無身心受彼生死而況於雜念者乎念佛多年何故終不得力四十四自無主宰但隨波逐浪任爾多年何能得力往生不往生利害在甚麼處四十五與阿彌陀佛一念相應利也有一絲放不下害也相應者猶云同聲相應同氣相求意也淨業以何為根以何為因以何為究竟四十六淨業行人當以菩提心為根以念佛為因以自利利他為究竟一毫之善皆可回向西方今不念佛但誦經故呪回向西方想亦不違教理四十七讀誦大乘經有明文然是助行觀經以修觀彌陀經以執持名號斯為正行棄正修助未達深理殊不知觀想持名者正使轉生成熟至命終時易于感應修餘行者恐願力稍疏為他歧移奪而致障往生耳念佛不要長齋否四十八若已先發菩提心決不再問此語昔日馬祖因官人問肉喫即是不喫即是祖云喫是中丞祿不喫是中丞福此語大有意味念佛人不能長齋亦得往生否四十九凡有過甚微薄更功能掩過而念佛求生極樂心甚親切至臨命終時道力勝于業力決可往生念佛門中帶惑往生十念成就等説學人耳邊大誤之極五十佛不誤人人自誤耳何謂自誤恃容帶惑往生居然造業為有十念成就任意因循豈知帶惑者不待三惑斷盡耳十念者就極忙人不暇多念者言也念佛人不悟此旨蹉跎過了臨命終時業力勝于道力奈何奈何所以平日間必當洗除惡習警䇿善根不致自誤也蓮池大師臨示寂囑云老實念佛唯老實念佛故不必講求論議五十一老實者純真無妄之謂非不講求為老實也經云佛法無人説雖慧莫能了世稱質朴者為老實人若全無知識則名呆人矣今云老實念佛非呆念佛可想而知世人六亂妄想剎那不住求個毫無知識底呆人念佛如何五十二雖是呆人他聞説念佛好便歡喜得知念佛好聞説念佛生西方他又歡喜得知念佛生西方於是遂呆念佛今日呆念明日呆念直呆念到命欲終時忽然阿彌陀佛放光接引彈指往生極樂世界此等人可謂呆而不呆若是聰明會打算人無所不通無所不曉今日忙明日忙若功垂後世者置弗論直忙到臘月三十日忽然業積如山面前齊現此時無計可施待人發放此等人可謂不呆而呆所謂如來説為可憐愍者是也修行不得進境咎在何處五十三修行者無他但滅諸習染之氣而已譬如磨鏡垢去明存一切衆生皆有種種習氣所以輪轉生死念佛者令其心歸大覺習染潛消若初果之破盡見惑二果之復破思惑六品三果之再破思惑三品四果之破盡見思緣覺之侵習十地菩薩地地之分斷一品無明等妙二覺亦復如是此等斷惑我輩安能祇可求佛攝受順佛方便慈恩帶惑往生然粗重垢染不得消除成何修道者即如貪瞋癡愛嫉妒諂曲乃至機械變詐名利私心等皆為障道惡緣我不能除被其所障所以修行不得進境親師近友常愁牽入火坑瞎煉盲修又恐終成骨董聞思既失進退何憑五十四末世法弱魔強不必言矣然虗心察取天下未必無人也此時看經一事不可緩但要知得看經道理假如念佛人看經應先取淨土門中經書詳加參究須會理通源勿迷情偏執本門明白復及餘經隨其心力可耳如今在家居士多取一本金剛經注解看了雖修淨業而淨業經書反不在意真無益而有損金剛經神妙不測彌陀經平實無奇二經相較勝劣可知五十五修行之士看佛經解佛義神妙不測以為勝平實無奇以為劣大不可也看經解義要於神妙不測處尋出平實無奇底理來平實無奇處尋出神妙不測底理來方稱具眼無量壽經三輩往生章三説發菩提心為往生樞要今何各知識開示於人惟念佛是説不及菩提心五十六龍舒校本遺漏發菩提心句雲栖正之省菴法師諄諄於此作勸發菩提心文極為懇切從上大善知識開念佛法門必以勸發菩提心為首務始盡廣大法門旨趣若近時者日趨日下儒書云何足算也無量壽經劇談五善五惡等文類似小乘經典五十七經云多有菩薩欲聞此經而不能得豈小乘經典耶依文不依義如之何其可也既有此問試作一解良由此經于經法滅盡之後尚留世百年以度有緣而末世之中根器益鈍我佛悲心徹底譬如長者告誡其子而子性愚劣難曉為作切實語就子可曉者而語之耳回向之詞輒謂普為衆生廣度衆生如此虗願而云有願必成人所難信五十八有口無心可稱虗願實有其心便為實願故曰必底也現在之普為當來之廣度若突然孤起未免空談華嚴經中善財童子遍參知識必云我已先發阿耨多羅三藐三菩提心而未知菩薩云何學菩薩道修菩薩行我聞聖者善能誘誨願為我説此是第一發心修行好榜樣既已先發菩提心則一切修行皆從菩提心中流出而普為衆生廣度衆生等盡是菩提心感發真實不虗何有不遂之理彌陀經云不可以少善根福德因緣得生彼國故知多則得生少則不生也五十九按無量壽經三輩往生此專指上輩説中下二輩自有差等念佛貴乎心持何必出聲六十心持念佛頗合深旨但出聲念佛者即以佛聲而為助緣有自他兼益之妙然則默念可乎六十一獨自念佛聲默皆宜若隨衆念佛定應出聲或謂六字念尚存皈敬之意四字念竟是直稱名號以為不可然否六十二古無此説此隨世諦知見然其稱名之義不屬于此也昏沈中念佛亦有利益否六十三昏沈中念佛正是口念心不念耳切須自己警覺勿使慣常世稱在家念佛誦經能令兒孫稀少果有其事否六十四為善降福為惡降殃此一定之理今以念佛誦經而降之殃豈念佛誦經為惡事耶理云何通又乏兒孫之人世間不少未必是念佛誦經者也此就世法而言若論佛法兒孫者前世所結之業緣耳賢兒孫是善業緣不肖兒孫是惡業緣無常之法盡是夢幻泡影念佛之緩急佛聲之高低念時之行坐如何合法六十五念佛太緩則散而無力太急則失于自在不緩不急則安詳清朗佛聲太高恐傷氣力太低易入昏散不高不低則悠揚和雅在道場大衆念佛行坐自有定香若二三知己自在念佛只取念佛如法不必拘定常例不妨通融大約坐時宜多行時宜少又清朗時宜多坐昏散時宜多行此其大意也近見佛七期中晚間跑香念佛謂之搶西方有此法否六十六余始聞不覺大駭西方可搶耶良由不信念佛輕賤念佛甚至信心者不肯念佛皆為此等無稽之談所誤遂不能興起道心且多令有識者避之而莫及吁可怪也已可痛也已一心不亂再求開示六十七心月孤圓光吞萬象心不自心亂從何起若向第二門頭不無方便譬如一個人愛了一件事或琴棋書畫或絲竹管絃他切心于此直是性命不顧寒不知寒熱不知熱倦不知倦飢不知飢一切正事都也拋却若有人來阻撓恨不可言如今將念佛求生西方這事亦是如是便是一心不亂念佛人何病最大何病最多六十八湛寂靈明本來無病情生智隔諸病生焉於中偏病最大貪病最多然非獨念佛一切修行同此故永明壽禪師著宗鏡録百卷萬善同歸集六卷皆醫偏病之妙藥也偏貪之病愚者固爾恐賢者未必如是六十九偏見貪習設賢者有此其病愈細當知鬥爭堅固並由偏病使然佛法衰殘皆因貪習所壞言念及此不覺淚下設欲回狂瀾于既倒如何而可七十全賴有力大人念佛深恩大家扶起不肖福德雖無敢效執鞭之役即今闡揚念佛法門應以何為先務七十一儒教有云事必師古又有云一須人品高二須師法古我等佛門修道亦當奉此語擇取古人為法縱不合時宜何妨隨緣度日擇取古人為法請示何人七十二事求簡約為功必深泛濫多歧有名無實今佛門中要人所熟悉兼多考據者則永明壽禪師蓮池大師省菴法師三人而已淨業中書籍煩多亦求簡約人所易于取閲者何書七十三蓮池大師雲栖法彚四明知禮法師妙宗鈔省菴法師著有省菴法師遺書皆必要者也其永明萬善同歸集雖非專主淨業然修淨業者不可少也若宗鏡録文富義繁乃第一大部論修道書不可忽也宋時王日休居士有龍舒淨土文本朝吳中彭二林居士所訂淨土聖賢録皆淨業正範斯二居士者在家念佛真切修持法門之柱石也日來拙刻蓮宗九祖傳略欲使蓮宗正派源流有所依憑而為文甚少最簡矣為法為人以何為先七十四先為自己何以故若不先為自己使己通達安能為法為人不但不能為法為人實多誤法誤人并自誤不少佛法大事八十老翁入場屋不是小兒戲不可不知也好為人師並非惡意何以有過七十五好為者實自用自專未曾明白而自以為明白者也所以有過出家受戒不必言矣在家男女入道如何七十六已發正信正願即當先受三皈行之既熟當自己發心進受五戒但先當擇有出家明師方可求受其菩薩戒準梵網經十重四十八輕者正是菩薩戒相必自己敬發大心切不可趁其高興隨人上下而受佛戒此時受戒之際第一要緊殷重心恭敬心千生難遇心發大菩提心斷不可草草輕聽時下慫恿之語彼引經引古俱非時之説也其式叉摩那以訛傳訛無人指正可歎也不肖狂言若是者非阻其勝緣實激發其勝心而成此勝緣耳式義摩那出家衆也今以處女當之故云訛倘不受皈戒還可修行否七十七亦可修行但應明白不受之故既合正理則可不然觀經云受持三歸具足衆戒是為淨業正因不肖更有一言若女人欲受歸戒者不妨請師至家堂十設座敬受淨土十要西方合論後載紀夢一篇是事甚奇七十八奇不奇姑置末後一則語宜志之中郎曰吾不圖樂之至此極也使吾生時嚴持戒律尚不至此大都乘戒俱急生品最高次戒急生最穩若有乘無戒多為業力所牽流入八部鬼神衆去余親見同人矣弟般若氣分頗深戒定力甚少夫悟理不能生戒定亦狂慧也歸五濁趁強健實悟實修兼持淨願勤行方便憐憫一切不久自有良晤一入他途可怖可畏如不能持戒有龍樹六齋法見存遵而行之殺戒尤急寄語同學未有日啓鸞刀口貪滋味而能生清泰者也雖説法如雲如雨何益于事此則是真語實語真可謂助揚佛化者也宜志之觀經云讀誦大乘然大乘經典甚夥當讀何經為要七十九讀誦大乘者三經而外常誦華嚴圓覺最勝其餘隨力可耳當讀經時要解義抑直讀八十龐居士偈云讀經須解義解義即修行若依了義學即入涅槃城但正讀時不必停聲解義讀時且取熟待定靜之候隨摘一文一句細味其意或再取善解參而會之久之自有會得處即所謂解義也金剛經為世所重何不入常誦之例八十一世人誦經修行此經者比比皆是想因見過壇經謂五祖示人云熟讀金剛經能明心見性故耳然古今來誦經者甚多而有會于心者絶少何也據不省看來無他但為注解所誤縱有悟處俱是識情計度非真悟也殊不知金剛經但熟讀忽爾會得畢竟有個入處故五祖云云耳然此意未易與人道也一切經典注者甚多俱誤人耶八十二噫此何説也各有機宜不可一例華嚴經則有清涼疏鈔華嚴合論圓覺則有圭峯略疏清涼國師千古正解若倦于煩長即觀合論李長者提唱十住初心便成正覺誠哉是言也圭峯禪師所解圓覺略疏一種簡而詳到妙品也其餘他經注解不及備説念佛本極要好忽有人非理相加及意外事橫生觸惱不能不動瞋心奈何八十三或念無常而自覺或咎惡業之自招或憐憫彼人之愚癡或保護自己之正念寒山子偈云瞋是心中火能燒功德林欲行菩薩道忍辱護瞋心誠如是一切逆境冰消瓦解念佛本求脫離忽有種種順境美緣前來纏縛如何即是八十四當先破一切順境美緣不是好事賺殺人也吾以極樂世界阿彌陀佛比之扯淡得極我方厭之惡之何貪愛之有哉出家人若得順境美緣正好紹隆佛法不可與在家同論八十五紹隆佛法談何容易好心出家者自應思之深思之將一切順境美緣安置妥貼莫錯因果在家人造業營生今歸依三寶念佛恐于理不合如何而可八十六此事又在當人自己善為調度因人之境界各各不同難作一定之説造業以害命為最若其造業營生於中大有積功積德之利今且不論大約明知而故犯惡業纍纍心云何安如將家事去濶就狹別圖生理能使不致飢凍即脫去造業二字豈不美乎貧富在于天命不可惑也念佛乃生死大事不可誤也念佛不得一心再乞一言開導八十七每見念佛未必六時無間念一時不過一二枝香而已縱有他事預先安排好了然後念佛心中既無所事即可一萬個不管於是坐下蒲團提起精神緊緊促促一念貫注於佛一句一句不令鬆隙這一二枝香何難不得一心隨常念佛亦欲一心而不可得再乞一言開導八十八此之一心與前問之一心作兩樣講法何也前者只要一切不管少不得一心矣是無事分心之一心也然人皆不免有事有事安得不管預為安排祗可暫智豈能安排隨常時乎若然有事動念即不得一心者則永無常得一心之時矣豈理也哉當知不二其心者亦一心之謂也何謂不二其心任他多般事來半各動念酬應安排打算而我之念佛求生淨土之心勇猛堅固不動不搖有事亦如是無事亦如是不增不減是為不二其心不二其心者一心也是有事分心之一心也前蒙開導極為條暢然止是有一心之一心未是無一心之一心究非真契一心之理八十九若以無一心為真契一心之理者汝落斷見矣汝豈不知有見無見亦有亦無見非有非無見皆戲論也吾今不管有見無見非有非無見亦有亦無見只管念佛求生淨土并且不見有不見無不見非有非無不見亦有亦無只見念佛求生淨土之心了了不可得人生根性不一云何而得同歸正道九十學道者少不得明師善友且明師善友須擇作家古語云打頭不遇作家到老終成骨董關係一生道業不亦重乎古人遇著作家師匠便忘命依從故易歸正道工夫易成今人輕忽師友絶無求道之心順其行為則周旋往返稍一逆之則遠而避去故明正道者鮮矣工夫之説尚可問乎東坡平日擕彌陀像行可謂切矣何以不往生九十一昔日東坡居士繪彌陀像一軸人問之曰此軾西方公據也其願生極樂之心亦可見矣但臨終之際有䇿以西方之事者則曰西方不無然個裡著力不得因而遂不聞其往生焉嗟乎正當著力之時而反云著力不得居士誤耶為揆其情緣東坡是大才子佛家言見過不少以為必得圓妙之法方推高手若老實念佛與愚夫愚婦何異似有不甘之意其奈圓妙處平日不曾打徹此時勉強張羅乃只見得個裡著力不得耳念佛人臨終往生平平實實一心念佛最好若好奇好勝所謂弄巧成拙東坡居士可為龜鑒念佛人命欲終時不見瑞應轉生疑慮其應如何九十二臨終瑞應者自知時至自見蓮華天樂迎空異香滿室等斯乃感應道交顯現其間但或隱或顯未可定也須知因真則果實不必疑慮此時只應放開一切念頭努力一心念佛臨終念佛猛利十惡罪人尚能往生淨土何況平素發願修行念佛者哉淨業行人終時往生不往生可決否九十三大段要看他平生行業據因論果此為一定之法若就臨終境界決者瑞應現前自不必説然要與修多羅合者是若錯雜不倫雖好亦非也統而言之大抵正念分明者必有一種清明自在作得主底氣象決不委靡不振時清時渾底境界也但見翛然撒手豈似油乾火盡不肖本師和尚臨終實有如是高致是不肖親眼見來者平生行業大有前後美惡不同者如何取準九十四不論前美後惡前惡後美但以末後一段修行為準淨業門頭有魔事否九十五豈無魔事行人被他所誤者少自誤者多不虗心自省不為道親賢內具掩飾過咎肚腸外強作修行顏面此之自誤皆名魔事念佛修行固是好事然年輕女人非所宜也九十六修行一事一切衆生共之無有不宜者言一切衆生則飛禽走獸地獄餓鬼等並在其中菩薩隨類化身常在飛禽走獸地獄餓鬼之內教化衆生令成佛道豈非無有不宜者乎我等居人倫之內為男為女為僧為俗為老為少皆極宜修行極宜趁早修行何也若飛禽走獸等罪障深重修行難人道修行易不于易時修行錯過可惜如謂女人年輕不宜修行者非也經中列聽衆常有童女之名童女豈非年輕者佛宜之而我等謂不宜可乎不過凡修行者在家人尤當調處合法不宜任聽庸流隨波逐浪徒為無益若念佛一門家中置前所開之經書女不識字男為解説隨分思惟其義謹守常課頻頻發願往生外間如有實有德者請至家中講演一番夫實有德者彼為法而來決不誤人修行倘貧賤之家於營生次忙裡偷間隨分念佛頻頻發願求生淨土不論富貴貧賤男女老少皆可念佛極宜修行念佛誦經家中不得安靜又不能淨口如何使得九十七世間人情惟銀錢最關切譬如這宗銀錢能到我手而尚未到我手中便時時憶想從不覺不安靜而不憶想者也今念佛求生淨土便嫌不安靜矣所以然者念佛求生淨土之心不似銀錢之關切故耳不然就于不安靜之間時時憶念有何不可至于不能淨口者若作佛事斷無不淨口之理今為修行只因此時未能淨口則不妨於未淨口時更修行起來誦經念佛有何不可道心一勇猛見得透誰人不能淨口乎三教同源究竟其理如何今在家學佛者多闡揚著作九十八如今初發信心通文墨者開口必談三教同源然三教者各有門戶各有家法各有至理烏可同也若至理同者釋迦牟尼佛於周昭王二十四年四月八日在中天竺國淨飯王宮初生下地之時便一手指天一手指地明白告言天上天下唯吾獨尊言獨尊可知無有並尊者矣即可見佛之至理實無有能同者此是了義説不是不了義説若説佛居其源千流萬派不出一源者汝當於此細思之歸到一源處才可名同未到一源處而只在千流萬派處豈不是異何可言同也今且毋庸如此費詞楞嚴經云一門超出妙莊嚴路凡修一門必由一門深入今修念佛即應從念佛深入且不許別門來雜況三教耶不肖嘗云儒釋二教為學之道理時時遇合儒釋所歸之至理有世間出世間之別也不肖又言三教同源之義未始無有汝但到了極樂世界不要説此間三教即十方無量世界界界無量教門盡在汝一箇鼻孔中出氣不為分外矣我佛實有如是至理備載羣經他書無有也三教同源説亦無傷何必苦苦辨之九十九元門外道每竊佛家言惑亂世人大害也儒與釋釋有助儒之益而儒有利釋之功佛眼視之分道揚鑣固無礙也惟是儒者好心學佛先因見得儒理淵源今三教同源一句便謂佛理猶如是爾於是不復精研遂失進修之階位終成蒙昧罔窮覺海之真源致使勝緣難就彼岸多虗乃三教同源之説誤之也故不得已而言之儒家之混沌佛教之三災依稀相似大三災到一切壞盡洞然無有儒中大聖大賢諒非凡夫所作是三界外果位中人來此隨類現身化人度世耳本不淪沒故不可槩言墮落淨土法門念佛往生修持大意略明于是矣其中再撮精要必令雅俗並賞有目皆覩一百尋常講説淨土多曰信行願最為緊要據我看來古人提出欣厭二門此欣厭二字尤為緊要也然猶未也若不認真雖欣厭亦空談也故知欣厭而復加之以認真可謂緊要中之緊要真為精要者矣何謂欣欣者欣慕也欣慕念佛欣慕西方苟能欣慕心必切何謂厭厭者厭離也厭離娑婆厭離生死苟能厭離心必遠欣慕必厭離厭離必欣慕未有厭離而不欣慕欣慕而不厭離者也惟其欣慕之極則所謂信也信必真所謂行也行必專所謂願也願必實若其欣慕不極厭離不極則雖信也信必淺雖行也行必浮雖願也願必疏故欲勸人發真信修專行立實願者先須開欣厭二門令他於念佛求生西方之事欣慕之極於娑婆五濁惡世生死海中厭離之極然後真信以發起專行以純熟實願以成就再䇿以認真修習如此念佛未有不往生者也此言不為深細亦不粗淺于理不為詳密亦不滲漏其亦可以雅俗並賞有目皆覩矣乎問答已至心回向敬説偈言我以大悲心闡揚念佛法仰祈三寶尊慈悲加護我假此螢火光化作智慧燈照耀於世間引之深念佛念佛願往生還來度含識西方不退轉直至成菩提跋水雲長老梵行高潔精研貝典尤深淨土法門志氣間淡不事雕琢真水雲若也與豫交最善是書問答百則提唱蓮宗皆是腳踏實地從正知正見流出剖疑辨惑切當今時上秉佛祖宗旨不違毫髮固末法之津梁至於出語直截立意圓正具眼者必能鑑諸可不待豫贅道光乙酉良月既望寶嚴學人貝墉謹跋於四色蓮居之南窗
