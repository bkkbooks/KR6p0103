front:
  text: 序一念念佛全念是佛是則名為自性彌陀觀想西方依正在觀是則名為唯心淨土隨其心淨則佛土淨如是如是一切衆生全性迷倒彌陀安在全心逐境淨土何存雖具性德未經修治三細六粗之所埋沒自昧衣珠流浪六趣如來說為可憐愍者世間富貴人天福報尚順勤苦且難稱心豈況出世了脫生死既生希望又畏勤修空言性德自誑誑人臘月三十悔之何及若夫既信此門又肯修習少見契經動生曲見如斯之類其又實繁當天台時已論十疑逮師子林又加或問像季末法障病斯多受佛密付諸大菩薩隨時啓闢隨根救療智者天如皆其人矣亦越于今又數百載善根益薄障執愈增偶有發心難逢善導水雲道人深窮教海義括三宗直透禪源燈該五葉而接引三根惟宏淨土省菴近法雲棲遠宗爰是先有九祖之述至于機宜普被宗教兼攝初學可企久修必循惟此念佛百問一卷中邊皆甜始終俱徹既簡而該亦深而淺掃去惟心不言自性竟認權乘匪泥實故尤為從上尊宿未經開闡所以者何執理性者多廢事修反誤生西著事相者不棄有為無礙直往認作權教方便施設徑中之徑顯佛垂慈益覺親切若此指示洵乎蓮宗寶筏淨土指歸一口吐盡一字不留者矣讀者果能心悅誠服如說精進慈尊決定遙為攝受八德池中必生蓮花神化形遷定當托質惟我道人證明非妄末學小子沐手焚香頂禮展讀讚歎無已十疑或問蓮池寸香滴髓真傳如是如是是書所在佛祖護念有緣遇此當廣流布散諸香華而供養之道光五年仲冬朔月淨業學人江沅拜撰自序書名念佛百問者何夫有問必有答不言答者答攝問中省文也為數百而所談皆念佛之事故名念佛百問焉或謂曰斯果彼問而君答之乎余良久曰此雖從我這裡出然我但知其皆談念佛之事不復憶其果彼問而我答抑我問而彼答之也其彼我雖茫然弗知而所談念佛事歷歷在茲姑請淨業之士用心於念佛者觀而思之或可以為螢光之一助則是已道光五年歲次乙酉夏六月朔古吳後學悟開書例言四則是書多為在家念佛修行者發直達心源痛掃支離紆曲好心學道之士願加參會而區區亦用自警云此就當時片刻之語只歸明白曉暢不求廣說但為在家說者自揣薄德未敢冒昧瀆聽于同侶然內有可通之處願鑒諸明眼上士惠我教益於中錯謬幸垂斥正
